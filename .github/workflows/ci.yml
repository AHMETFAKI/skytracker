name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Analyze, test & build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # .env is gitignored but declared as a bundled asset in pubspec.yaml.
      # Create it from the example so analyze/build find the asset; mock-first
      # mode needs no real keys (OpenSky/MapTiler stay empty).
      - name: Create .env from example
        run: cp .env.example .env

      # Generated code (*.g.dart, *.freezed.dart, *.gr.dart, *.config.dart) is
      # gitignored, so it must be regenerated in CI before analyze/test/build.
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # Builds without Firebase config: the google-services Gradle plugin is
      # applied only when google-services.json exists, so the debug APK proves
      # the app compiles in the mock-first configuration.
      - name: Build debug APK
        run: flutter build apk --debug
